command_mux:
  ros__parameters:
    app_cmd_vel_topic: "/robot/apps/cmd_vel"
    output_cmd_vel_topic: "/robot/cmd_vel"
    safety_topic: "/robot/safety_status"
    status_topic: "/robot/command_mux/status"

    command_timeout_sec: 0.5
    publish_rate_hz: 10.0

    stop_on_emergency_stop: true
    stop_on_bumper: true
    stop_on_cliff: true
    stop_on_wheel_drop: true
    stop_on_hazard: true
