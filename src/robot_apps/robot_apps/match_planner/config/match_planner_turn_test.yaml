match_planner_node:
  ros__parameters:
    status_topic: "/robot_apps/match_planner/status"
    set_start_service: "/robot_apps/match_planner/set_start"
    set_goal_service: "/robot_apps/match_planner/set_goal"
    localize_service: "/robot_apps/match_planner/localize"
    match_loop_period_sec: 0.1
    start_paused: true
    localize_while_idle: false
    load_map: true
    enable_movement: true
    enable_turning: true
    enable_potential_field: false
    turn_threshold_deg: 0.1
    hard_turn_threshold_deg: 90.0
    depth_image_width: 640
    depth_image_height: 480
    turn_timeout_sec: 0.5
    max_turn_angle_deg: 30.0
    display_windows: false
    log_to_file: false
    log_to_console: false

localizer_stub_node:
  ros__parameters:
    localize_service: "/robot_apps/match_planner/localize"
    stub_confidence: 0.95
    stub_node_sequence: [1, 5]
    stub_x_sequence: [0.0, 0.0]
    stub_y_sequence: [0.0, 0.0]
    stub_yaw_sequence: [180.0, 180.0]
    stub_confidence_sequence: [0.95, 0.95]
    stub_status_sequence:
      - "localizer stub matched start node for guarded turn"
      - "localizer stub matched destination node after guarded turn"
