localizer_server:
  host: "0.0.0.0"
  port: 62027
  show_images: false

python_env:
  # Enable this on the laptop when the localizer server needs TensorFlow/CNN/MCL.
  enabled: true
  # Runs a short TensorFlow import/GPU check as a separate process during laptop launch.
  run_tensorflow_check: true
  # Relative paths are resolved from the workspace root, not from src/.
  venv_path: ".venv"
  python_executable: ""
  add_nvidia_library_path: true
  disable_onednn_opts: true
  limit_tensorflow_threads: true
  # DO NOT enable this, this transfers gui processes to the venv.
  use_for_gui: false

video_stream:
  gui:
    refresh_ms: 33
    planner_status_host: "0.0.0.0"
    planner_status_port: 62029
    # Robot IP. The unified GUI connects to the robot-side command server.
    planner_command_ip: "141.140.243.85"
    planner_command_port: 62030
  server:
    host: "0.0.0.0"
    port: 62028
    show_images: true
    fps_report_period: 2.0
  client:
    server_ip: "10.32.1.15"
    port: 62028
    target_fps: 30.0
    jpeg_quality: 45
    resize_width: 320
    resize_height: 240
    send_depth: true
